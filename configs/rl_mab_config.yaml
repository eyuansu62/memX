# MemoryAgentBench (MAB) baseline config template.
#
# Notes:
#   - Create `configs/rl_mab_config.local.yaml` (gitignored) for private api keys/endpoints.
#   - Splits: Accurate_Retrieval | Test_Time_Learning | Long_Range_Understanding | Conflict_Resolution
#   - Example usage:
#       python run/run_mab.py --config configs/rl_mab_config.yaml --split Accurate_Retrieval

llm:
  provider: "openai"
  api_key: "EMPTY"
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-4B-Instruct-2507"
  temperature: 0.0
  max_tokens: 256

embedding:
  provider: "openai"
  api_key: "EMPTY"
  base_url: "http://localhost:8001/v1"
  model: "Qwen3-Embedding-4B"
  max_text_len: 4096
  vector_dimension: 2560

memory:
  build_strategy: "proceduralization"
  retrieve_strategy: "query"
  update_strategy: "adjustment"
  k_retrieve: 5
  max_keywords: 8
  confidence_threshold: 0.0
  memory_confidence: 100.0
  add_similarity_threshold: 0.9
  mos_config_path: "configs/mos_config.json"
  user_id: "mab_memrl"
  sim_norm_mean: 0.31
  sim_norm_std: 0.10

environment:
  alfworld_config_path: "configs/base_config.yaml"
  alfworld_env_type: "AlfredTWEnv"

experiment:
  experiment_name: "mab_baseline"
  algorithm: "rl"
  val_before_train: false
  enable_value_driven: true
  random_seed: 42
  mode: "test"
  dataset_ratio: 1.0
  few_shot_path: "data/alfworld/alfworld_examples.json"
  bon: 0
  hle_categories: null
  hle_category_ratio: null
  train_valid_split: 1.0
  batch_size: 8
  num_sections: 1
  ckpt_eval_enabled: false
  ckpt_eval_path: null
  ckpt_resume_enabled: false
  ckpt_resume_path: null
  ckpt_resume_epoch: null
  baseline_mode: null
  baseline_k: 10
  output_dir: "./results"
  save_trajectories: true
  save_memories: false
  enable_logging: true
  log_level: "INFO"

rl_config:
  epsilon: 0.0
  tau: 0.25
  alpha: 0.3
  gamma: 0.0
  q_init_pos: 0.0
  q_init_neg: 0.0
  success_reward: 1.0
  failure_reward: -1.0
  sim_threshold: 0.3
  topk: 5
  novelty_threshold: 0.85
  recency_boost: 0.0
  reward_merge_gain: 0.1
  q_min_threshold: -0.8
  weight_sim: 0.5
  weight_q: 0.5
