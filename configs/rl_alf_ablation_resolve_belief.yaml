# LLM provider configuration
llm:
  provider: "openai"
  api_key: "local"
  base_url: "http://localhost:8000/v1"
  model: "Qwen/Qwen3-30B-A3B-Instruct-2507-FP8"
  temperature: 0
  max_tokens: 4096

# Embedding provider configuration
embedding:
  provider: "openai"
  api_key: "local"
  base_url: "http://localhost:8001/v1"
  model: "Qwen3-Embedding-4B"
  max_text_len: 4096
  vector_dimension: 2560

# Memory system configuration
memory:
  # Strategy configuration (main combination from paper)
  build_strategy: "proceduralization"
  retrieve_strategy: "query"
  update_strategy: "adjustment"
  
  # Memory parameters
  k_retrieve: 5
  max_keywords: 8
  confidence_threshold: 0.0
  memory_confidence: 100.0
  add_similarity_threshold: 0.90
  # MemOS configuration
  mos_config_path: "configs/mos_config_final.json"
  user_id: "memrl_user"
  sim_norm_mean: 0.5187
  sim_norm_std: 0.1203

# Environment-specific settings
environment:
  # ALFWorld settings
  alfworld_config_path: "configs/envs/alfworld.yaml"
  alfworld_env_type: "AlfredTWEnv"

# Experiment configuration
experiment:
  random_seed: 42
  enable_value_driven: true
  experiment_name: 'ablation_resolve_belief'  # Name for Trail.
  mode: 'train'  # control whether to only test, if set as 'test' won't run on train spilt.
  num_sections: 10  # Number of sections (re-uses the same training set each section)
  batch_size: 32  # Number of parallel environments for sampling.
  dataset_ratio: 0.2  # Proportion of files randomly selected for training (rest used for validation)
  few_shot_path: 'configs/alfworld/alfworld_examples.json' # path for alfworld examples
  state_first: true
  # Compile mode: off | annotate | summary | resolve
  compile_mode: "resolve"
  # Whether compiler sees belief metadata (for ablation)
  compiler_use_belief: true
  baseline_mode: none   # passk
  baseline_k: 10

  # Output settings
  output_dir: "./results"
  save_trajectories: true
  save_memories: true
  ckpt_eval_enabled: false
  ckpt_eval_path: ""
  ckpt_resume_enabled: false
  ckpt_resume_path: ""
  ckpt_resume_epoch: null

# Belief-augmented memory config (BeliefMemoryService).
belief:
  weight_legacy: 0.45
  weight_belief_similarity: 0.25
  weight_belief_posterior: 0.20
  weight_conflict_penalty: 0.10
  auto_refine_conflict_threshold: 0.75
  auto_refine_min_reuse: 5

# Compiler LLM (for resolve/summary modes).
# Set use_actor_model: false to use a separate (potentially stronger) model.
compiler:
  use_actor_model: true
  # provider: "openai"
  # api_key: "sk-REPLACE_ME"
  # base_url: "http://localhost:8000/v1"
  # model: "Qwen3-30B-A3B"
  # temperature: 0.3
  # max_tokens: 1024

# RL Configs:s
rl_config:
  epsilon: 0             # ε-greedy exploration probability
  tau: 0.62              # unknown detection threshold on similarity
  alpha: 0.3             # Q-learning step size
  gamma: 0.0             # discount factor (single-step default)
  q_init_pos: 0          # optimistic initialization
  q_init_neg: 0          # negative q init
  success_reward: 1.0
  failure_reward: -1.0
  topk: 3                  # candidate set size for value-aware selection
  novelty_threshold: 0.85  # similarity to treat as non-novel (merge)
  recency_boost: 0.0     # optional recency weight
  reward_merge_gain: 0.1 # gain for attributing success to close memories
  q_min_threshold: -10
  weight_sim: 0.5        # weight for similarity in combined score
  weight_q: 0.5          # weight for Q-value in combined score