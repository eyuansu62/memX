# LLM provider configuration (local vLLM)
llm:
  provider: "openai"
  api_key: "dummy"
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-4B-Instruct-2507"
  temperature: 0
  max_tokens: 4096

# Embedding provider configuration (local vLLM)
embedding:
  provider: "openai"
  api_key: "dummy"
  base_url: "http://localhost:8001/v1"
  model: "Qwen3-Embedding-4B"
  max_text_len: 4096
  vector_dimension: 2560

# Memory system configuration
memory:
  build_strategy: "proceduralization"
  retrieve_strategy: "query"
  update_strategy: "adjustment"

  k_retrieve: 5
  max_keywords: 8
  confidence_threshold: 0.0
  memory_confidence: 100.0
  add_similarity_threshold: 0.90
  mos_config_path: "configs/mos_config_final.json"
  user_id: "memrl_user"
  sim_norm_mean: 0.5187
  sim_norm_std: 0.1203

# Environment-specific settings
environment:
  alfworld_config_path: "configs/envs/alfworld.yaml"
  alfworld_env_type: "AlfredTWEnv"

# Experiment configuration
experiment:
  random_seed: 42
  enable_value_driven: true
  experiment_name: 'alfworld_qwen3_4b_nojudge'
  mode: 'train'
  num_sections: 10
  batch_size: 32
  dataset_ratio: 1.0
  few_shot_path: 'configs/alfworld/alfworld_examples.json'
  baseline_mode: none
  baseline_k: 10

  use_llm_judge: false
  llm_judge_alpha: 0.3

  output_dir: "./results"
  save_trajectories: true
  save_memories: true
  ckpt_eval_enabled: false
  ckpt_eval_path: ""
  ckpt_resume_enabled: false
  ckpt_resume_path: ""
  ckpt_resume_epoch: null

# Belief-augmented memory config (BeliefMemoryService).
# Uncomment and override individual fields as needed; all defaults match BeliefConfig dataclass.
# belief:
#   weight_legacy: 0.45
#   weight_belief_similarity: 0.25
#   weight_belief_posterior: 0.20
#   weight_conflict_penalty: 0.10
#   auto_refine_conflict_threshold: 0.5
#   auto_refine_min_reuse: 3

# RL Configs
rl_config:
  epsilon: 0
  tau: 0.62
  alpha: 0.3
  gamma: 0.0
  q_init_pos: 0
  q_init_neg: 0
  success_reward: 1.0
  failure_reward: -1.0
  topk: 3
  novelty_threshold: 0.85
  recency_boost: 0.0
  reward_merge_gain: 0.1
  q_min_threshold: -10
  weight_sim: 0.5
  weight_q: 0.5
