# LLM provider configuration
llm:
  provider: "openai"
  api_key: "sk-REPLACE_ME"
  base_url: "https://api.openai.com/v1"
  model: "gpt-4-turbo"
  temperature: 0.0
  max_tokens: 256

# Embedding provider configuration
embedding:
  provider: "openai"
  api_key: "sk-REPLACE_ME"
  base_url: "https://api.openai.com/v1"
  model: "text-embedding-3-large"
  max_text_len: 4096
  vector_dimension: 3072

# Memory system configuration
memory:
  build_strategy: "proceduralization"
  retrieve_strategy: "query"
  update_strategy: "adjustment"

  k_retrieve: 5
  max_keywords: 8
  confidence_threshold: 0.0
  memory_confidence: 100.0
  add_similarity_threshold: 0.90
  mos_config_path: "configs/mos_config_final.json"
  user_id: "memrl_user"
  sim_norm_mean: 0.1856827586889267
  sim_norm_std: 0.09407906234264374

# Environment-specific settings
environment:
  alfworld_config_path: "configs/envs/alfworld.yaml"
  alfworld_env_type: "AlfredTWEnv"

# Experiment configuration
experiment:
  random_seed: 42
  enable_value_driven: true
  experiment_name: 'locomo_memrl'
  mode: 'train'
  num_sections: 5
  batch_size: 16
  dataset_ratio: 1.0
  train_valid_split: 0.8   # 8 conversations train, 2 valid
  few_shot_path: ''
  baseline_mode: null
  baseline_k: 10
  output_dir: "./results"
  save_trajectories: true
  save_memories: true
  ckpt_eval_enabled: false
  ckpt_eval_path: ""
  ckpt_resume_enabled: false
  ckpt_resume_path: ""
  ckpt_resume_epoch: 0

# Belief-augmented memory config (BeliefMemoryService).
# Uncomment and override individual fields as needed; all defaults match BeliefConfig dataclass.
# belief:
#   weight_legacy: 0.45
#   weight_belief_similarity: 0.25
#   weight_belief_posterior: 0.20
#   weight_conflict_penalty: 0.10
#   auto_refine_conflict_threshold: 0.5
#   auto_refine_min_reuse: 3

# RL Configs
rl_config:
  epsilon: 0
  tau: 0.25
  alpha: 0.3
  gamma: 0.0
  q_init_pos: 0
  q_init_neg: 0
  success_reward: 1.0
  failure_reward: -1.0
  topk: 3
  novelty_threshold: 0.85
  recency_boost: 0.0
  reward_merge_gain: 0.1
  q_min_threshold: -10
  weight_sim: 0.5
  weight_q: 0.5
