# Training: Qwen3-30B-A3B-FP8 with LLM judge
llm:
  provider: "openai"
  api_key: "dummy"
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-30B-A3B-Instruct-2507-FP8"
  temperature: 0
  max_tokens: 4096

embedding:
  provider: "openai"
  api_key: "dummy"
  base_url: "http://localhost:8001/v1"
  model: "Qwen3-Embedding-4B"
  max_text_len: 4096
  vector_dimension: 2560

memory:
  build_strategy: "proceduralization"
  retrieve_strategy: "query"
  update_strategy: "adjustment"
  k_retrieve: 5
  max_keywords: 8
  confidence_threshold: 0.0
  memory_confidence: 100.0
  add_similarity_threshold: 0.90
  mos_config_path: "configs/mos_config_final.json"
  user_id: "memrl_user"
  sim_norm_mean: 0.5187
  sim_norm_std: 0.1203

environment:
  alfworld_config_path: "configs/envs/alfworld.yaml"
  alfworld_env_type: "AlfredTWEnv"

experiment:
  random_seed: 42
  enable_value_driven: true
  experiment_name: 'alfworld_qwen3_30b'
  mode: 'train'
  num_sections: 10
  batch_size: 32
  dataset_ratio: 1.0
  few_shot_path: 'configs/alfworld/alfworld_examples.json'
  baseline_mode: none
  baseline_k: 10
  use_llm_judge: true
  llm_judge_alpha: 0.3
  valid_interval: 1
  test_interval: 1

  output_dir: "./results"
  save_trajectories: true
  save_memories: true
  ckpt_eval_enabled: false
  ckpt_eval_path: ""
  ckpt_resume_enabled: false
  ckpt_resume_path: ""
  ckpt_resume_epoch: null

rl_config:
  epsilon: 0
  tau: 0.62
  alpha: 0.3
  gamma: 0.0
  q_init_pos: 0
  q_init_neg: 0
  success_reward: 1.0
  failure_reward: -1.0
  topk: 3
  novelty_threshold: 0.85
  recency_boost: 0.0
  reward_merge_gain: 0.1
  q_min_threshold: -10
  weight_sim: 0.5
  weight_q: 0.5
